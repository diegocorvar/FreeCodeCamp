<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Playing Cards</title>
        <link rel="stylesheet" href="./styles.css"/>
    </head>

    <body>
        <main id="playing-cards">
            <div class="card">
                <div class="left">
                    <span class="lft-top-corner">A</span>
                    <span class="lft-top-corner">♠</span>
                </div>
                <div class="middle">
                    <span>♠</span>
                </div>
                <div class="right">
                    <span class="rgt-bttm-corner">A</span>
                    <span class="rgt-bttm-corner">♠</span>
                </div>
            </div>

            <div class="card">
                <div class="left">
                    <span class="lft-top-corner">2</span>
                    <span class="lft-top-corner">♣</span>
                </div>
                <div class="middle">
                    <span>♣</span>
                    <span>♣</span>
                </div>
                <div class="right">
                    <span class="rgt-bttm-corner">2</span>
                    <span class="rgt-bttm-corner">♣</span>
                </div>
            </div>

            <div class="card red-card">
                <div class="left">
                    <span class="lft-top-corner">3</span>
                    <span class="lft-top-corner">♥</span>
                </div>
                <div class="middle">
                    <span>♥</span>
                    <span>♥</span>
                    <span>♥</span>
                </div>
                <div class="right">
                    <span class="rgt-bttm-corner">3</span>
                    <span class="rgt-bttm-corner">♥</span>
                </div>
            </div>

            <div class="card">
                <div class="left">
                    <span class="lft-top-corner">4</span>
                    <span class="lft-top-corner">♣</span>
                </div>
                <div class="middle">
                    <span>♣♣</span>
                    <span>♣♣</span>
                </div>
                <div class="right">
                    <span class="rgt-bttm-corner">4</span>
                    <span class="rgt-bttm-corner">♣</span>
                </div>
            </div>

            <div class="card red-card">
                <div class="left">
                    <span class="lft-top-corner">5</span>
                    <span class="lft-top-corner">♦</span>
                </div>
                <div class="middle">
                    <span>♦♦</span>
                    <span>♦</span>
                    <span>♦♦</span>
                </div>
                <div class="right">
                    <span class="rgt-bttm-corner">5</span>
                    <span class="rgt-bttm-corner">♦</span>
                </div>
            </div>
        </main>
    </body>

</html>
